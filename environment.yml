name: pangolin
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  - biopython>=1.74
  - minimap2>=2.16
  - pip
  - python>=3.7
  - snakemake-minimal>=5.13,!=7.30.1,<8
  - gofasta
  - ucsc-fatovcf>=426
  - usher>=0.6.1,<=0.6.3
  - git-lfs
  - pip:
    - git+https://github.com/cov-lineages/pangolin-data.git
    - git+https://github.com/cov-lineages/scorpio.git
    - git+https://github.com/cov-lineages/constellations.git

